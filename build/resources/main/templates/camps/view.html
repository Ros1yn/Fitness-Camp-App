<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${camp.name} + ' - FitCamp'">Szczegoly obozu - FitCamp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <nav th:replace="~{fragments/layout :: navbar}"></nav>
        
        <main class="main-content">
            <div class="container" style="max-width: 900px;">
                <a href="/camps" class="btn btn-outline mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Powrot do obozow
                </a>
                
                <div class="card">
                    <div class="camp-card-header" style="padding: 2rem;">
                        <h1 th:text="${camp.name}" style="color: white; font-size: 2rem; margin-bottom: 0.75rem;">Nazwa obozu</h1>
                        <div class="camp-card-location" style="font-size: 1rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>
                            <span th:text="${camp.location}">Lokalizacja</span>
                        </div>
                    </div>
                    
                    <div class="card-body">
                        <div class="stats-grid mb-4">
                            <div class="stat-card">
                                <div class="stat-card-icon blue">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                        <line x1="16" y1="2" x2="16" y2="6"/>
                                        <line x1="8" y1="2" x2="8" y2="6"/>
                                        <line x1="3" y1="10" x2="21" y2="10"/>
                                    </svg>
                                </div>
                                <span class="stat-label">Data rozpoczecia</span>
                                <span class="stat-value" style="font-size: 1.25rem;" th:text="${#temporals.format(camp.startDate, 'd MMM yyyy')}">1 sty 2026</span>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-icon green">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                        <line x1="16" y1="2" x2="16" y2="6"/>
                                        <line x1="8" y1="2" x2="8" y2="6"/>
                                        <line x1="3" y1="10" x2="21" y2="10"/>
                                    </svg>
                                </div>
                                <span class="stat-label">Data zakonczenia</span>
                                <span class="stat-value" style="font-size: 1.25rem;" th:text="${#temporals.format(camp.endDate, 'd MMM yyyy')}">7 sty 2026</span>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-icon yellow">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                        <circle cx="9" cy="7" r="4"/>
                                    </svg>
                                </div>
                                <span class="stat-label">Wolne miejsca</span>
                                <span class="stat-value" style="font-size: 1.25rem;" th:text="${camp.availableSpots} + ' / ' + ${camp.capacity}">20 / 25</span>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-icon purple">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="12" y1="1" x2="12" y2="23"/>
                                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                                    </svg>
                                </div>
                                <span class="stat-label">Cena</span>
                                <span class="stat-value" style="font-size: 1.25rem; color: var(--color-primary);" th:text="${#numbers.formatDecimal(camp.price, 1, 2)} + ' zl'">299.99 zl</span>
                            </div>
                        </div>
                        
                        <div class="section">
                            <h3 class="mb-3">O tym obozie</h3>
                            <p th:text="${camp.description}" class="text-muted" style="line-height: 1.7;">
                                Opis obozu...
                            </p>
                        </div>
                        
                        <div class="flex gap-3 mt-4">
                            <a th:if="${camp.hasAvailableSpots()}" th:href="@{/register(campId=${camp.id})}" class="btn btn-primary btn-lg">
                                Zapisz sie na ten oboz
                            </a>
                            <span th:unless="${camp.hasAvailableSpots()}" class="btn btn-secondary btn-lg" style="cursor: not-allowed;">
                                Ten oboz jest pelny
                            </span>
                            <a href="/camps" class="btn btn-outline btn-lg">Przegladaj inne obozy</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</body>
</html>
