<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brak dostepu - FitCamp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <nav th:replace="~{fragments/layout :: navbar}"></nav>
        
        <main class="main-content">
            <div class="container">
                <div class="success-container">
                    <div class="success-icon" style="background-color: #fee2e2; color: var(--color-danger);">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </div>
                    
                    <h1>Brak dostepu</h1>
                    <p class="text-muted mt-2 mb-4">
                        Nie masz uprawnien do tej strony. Zaloguj sie na autoryzowane konto.
                    </p>
                    
                    <div class="flex gap-3 justify-center" style="justify-content: center;">
                        <a href="/login" class="btn btn-primary">Zaloguj sie</a>
                        <a href="/" class="btn btn-outline">Powrot do strony glownej</a>
                    </div>
                </div>
            </div>
        </main>
        
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</body>
</html>
