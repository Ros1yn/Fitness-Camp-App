<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarzadzanie obozami - FitCamp Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <nav th:replace="~{fragments/layout :: navbar}"></nav>
        
        <main class="main-content">
            <div class="container">
                <div class="page-header">
                    <div>
                        <h1>Zarzadzanie obozami</h1>
                        <p class="text-muted mt-1">Tworzenie i zarzadzanie obozami fitness</p>
                    </div>
                    <a href="/admin/camps/new" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Utworz nowy oboz
                    </a>
                </div>
                
                <div th:if="${successMessage}" class="alert alert-success">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span th:text="${successMessage}">Komunikat sukcesu</span>
                </div>
                
                <div class="card">
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Nazwa obozu</th>
                                    <th>Lokalizacja</th>
                                    <th>Daty</th>
                                    <th>Pojemnosc</th>
                                    <th>Cena</th>
                                    <th>Status</th>
                                    <th>Akcje</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(camps)}">
                                    <td colspan="7" class="text-center text-muted" style="padding: 2rem;">
                                        Brak obozow. <a href="/admin/camps/new">Utworz pierwszy oboz</a>
                                    </td>
                                </tr>
                                <tr th:each="camp : ${camps}">
                                    <td>
                                        <strong th:text="${camp.name}">Nazwa obozu</strong>
                                    </td>
                                    <td th:text="${camp.location}">Lokalizacja</td>
                                    <td th:text="${#temporals.format(camp.startDate, 'd MMM')} + ' - ' + ${#temporals.format(camp.endDate, 'd MMM yyyy')}">1 sty - 7 sty 2026</td>
                                    <td>
                                        <span th:text="${camp.capacity - camp.availableSpots} + ' / ' + ${camp.capacity}">5 / 25</span>
                                        <span class="text-muted" style="font-size: 0.75rem;" th:text="'(' + ${camp.availableSpots} + ' wolnych)'"> (20 wolnych)</span>
                                    </td>
                                    <td th:text="${#numbers.formatDecimal(camp.price, 1, 2)} + ' zl'">299.99 zl</td>
                                    <td>
                                        <span class="badge" th:classappend="${camp.isActive} ? 'badge-active' : 'badge-inactive'"
                                              th:text="${camp.isActive} ? 'Aktywny' : 'Nieaktywny'">Aktywny</span>
                                    </td>
                                    <td>
                                        <div class="table-actions">
                                            <a th:href="@{/admin/camps/{id}/participants(id=${camp.id})}" class="btn btn-outline btn-sm" title="Zobacz uczestnikow">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                                    <circle cx="9" cy="7" r="4"/>
                                                </svg>
                                            </a>
                                            <a th:href="@{/admin/camps/edit/{id}(id=${camp.id})}" class="btn btn-outline btn-sm" title="Edytuj">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                                </svg>
                                            </a>
                                            <form th:action="@{/admin/camps/delete/{id}(id=${camp.id})}" method="post" style="display: inline;"
                                                  onsubmit="return confirm('Czy na pewno chcesz usunac ten oboz? Tej akcji nie mozna cofnac.');">
                                                <button type="submit" class="btn btn-danger btn-sm" title="Usun">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                        <polyline points="3 6 5 6 21 6"/>
                                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                                    </svg>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="mt-4">
                    <a href="/admin/dashboard" class="btn btn-outline">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"/>
                            <polyline points="12 19 5 12 12 5"/>
                        </svg>
                        Powrot do panelu
                    </a>
                </div>
            </div>
        </main>
        
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</body>
</html>
