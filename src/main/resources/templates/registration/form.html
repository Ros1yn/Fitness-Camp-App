<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja - FitCamp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <nav th:replace="~{fragments/layout :: navbar}"></nav>
        
        <main class="main-content">
            <div class="container" style="max-width: 600px;">
                <div class="page-header" style="justify-content: center; text-align: center;">
                    <div>
                        <h1>Rejestracja na oboz</h1>
                        <p class="text-muted mt-1">Wypelnij swoje dane, aby zarezerwowac miejsce</p>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/register}" th:object="${participant}" method="post">
                            <div class="form-group">
                                <label for="firstName" class="form-label">Imie *</label>
                                <input type="text" id="firstName" th:field="*{firstName}" 
                                       class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''"
                                       placeholder="Wprowadz swoje imie" required>
                                <div th:if="${#fields.hasErrors('firstName')}" class="invalid-feedback" th:errors="*{firstName}">Blad</div>
                            </div>
                            
                            <div class="form-group">
                                <label for="lastName" class="form-label">Nazwisko *</label>
                                <input type="text" id="lastName" th:field="*{lastName}" 
                                       class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''"
                                       placeholder="Wprowadz swoje nazwisko" required>
                                <div th:if="${#fields.hasErrors('lastName')}" class="invalid-feedback" th:errors="*{lastName}">Blad</div>
                            </div>
                            
                            <div class="form-group">
                                <label for="email" class="form-label">Adres email *</label>
                                <input type="email" id="email" th:field="*{email}" 
                                       class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                       placeholder="twoj.email@przyklad.pl" required>
                                <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback" th:errors="*{email}">Blad</div>
                            </div>
                            
                            <div class="form-group">
                                <label for="phone" class="form-label">Numer telefonu *</label>
                                <input type="tel" id="phone" th:field="*{phone}" 
                                       class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                       placeholder="+48-123-456-789" required>
                                <div th:if="${#fields.hasErrors('phone')}" class="invalid-feedback" th:errors="*{phone}">Blad</div>
                            </div>
                            
                            <div class="form-group">
                                <label for="camp" class="form-label">Wybierz oboz *</label>
                                <select id="camp" th:field="*{camp.id}" 
                                        class="form-control" th:classappend="${#fields.hasErrors('camp')} ? 'is-invalid' : ''"
                                        required>
                                    <option value="">-- Wybierz oboz --</option>
                                    <option th:each="camp : ${camps}" 
                                            th:value="${camp.id}" 
                                            th:text="${camp.name} + ' (' + ${#temporals.format(camp.startDate, 'd MMM')} + ' - ' + ${#temporals.format(camp.endDate, 'd MMM')} + ') - ' + ${#numbers.formatDecimal(camp.price, 1, 2)} + ' zl'"
                                            th:disabled="${!camp.hasAvailableSpots()}">
                                        Nazwa obozu
                                    </option>
                                </select>
                                <div th:if="${#fields.hasErrors('camp')}" class="invalid-feedback" th:errors="*{camp}">Blad</div>
                            </div>
                            
                            <div class="form-group">
                                <label for="notes" class="form-label">Dodatkowe uwagi (opcjonalnie)</label>
                                <textarea id="notes" th:field="*{notes}" class="form-control" rows="3"
                                          placeholder="Jakies specjalne wymagania lub pytania?"></textarea>
                            </div>
                            
                            <div class="flex gap-3 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg" style="flex: 1;">Wyslij rejestracje</button>
                                <a href="/camps" class="btn btn-outline btn-lg">Anuluj</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</body>
</html>
